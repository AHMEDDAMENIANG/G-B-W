<script src="https://jsdelivr.net"></script>
<script>
    // Configuration automatique de votre adresse Supabase
    const SUPABASE_URL = "https://supabase.co"; // Remplacez par votre URL réelle si nécessaire
    const SUPABASE_KEY = "sb_publishable_75_PjC_NLzdxaLfuiU-0g_hSmidt-J";

    // Initialisation correcte du client
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadProducts() {
        const container = document.getElementById('catalog-container');
        try {
            const { data, error } = await supabase.from('products').select('*');

            if (error) {
                document.getElementById('status-message').innerText = "Erreur de connexion aux données.";
                console.error(error);
                return;
            }

            container.innerHTML = "";

            if (!data || data.length === 0) {
                container.innerHTML = "<div class='loading'>Aucun article disponible pour le moment.</div>";
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div>
                        <span class="badge">${item.category || 'Général'}</span>
                        <h3 class="product-title">${item.name || 'Article sans nom'}</h3>
                    </div>
                    <div>
                        <p class="price">${item.price ? item.price + ' FCFA' : 'Prix sur demande'}</p>
                        <p class="supplier">Magasin : ${item.supplier || 'Partenaire GBW'}</p>
                    </div>
                `;
            `;
                container.appendChild(card);
            });
        } catch (err) {
            document.getElementById('status-message').innerText = "Erreur critique de chargement.";
            console.error(err);
        }
    }

    // Premier chargement des produits au démarrage
    loadProducts();

    // Ecoute des changements en temps réel (Realtime)
    supabase.channel('custom-all-channel')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'products' }, () => {
            loadProducts();
        })
        .subscribe();
</script>
