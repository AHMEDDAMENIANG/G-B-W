<script>
    // 1. Initialisation
    Pi.init({ version: "2.0", sandbox: true });

    // 2. Fonction de démarrage (Authentification)
    async function startFlow() {
        try {
            const user = await Pi.authenticate(['payments'], onIncompletePaymentFound);
            console.log("Connecté :", user.user.username);

            const payBtn = document.getElementById('btn-payment');
            if(payBtn) {
                payBtn.onclick = createPiPayment;
            }
        } catch (err) {
            console.error("Erreur Pi Browser :", err);
        }
    }

    // 3. Fonction qui déclenche le paiement au clic sur le bouton
    function createPiPayment() {
        Pi.createPayment({
            amount: 0.1,
            memo: "Test Transaction GBW",
            metadata: { orderId: "GBW-" + Date.now() }
        }, {
            onReadyForServerApproval: function(paymentId) {
                alert("Paiement envoyé pour approbation ! ID : " + paymentId);
            },
            onReadyForServerCompletion: function(paymentId, txid) {
                alert("Paiement terminé avec succès ! TXID : " + txid);
            },
            onCancel: function(paymentId) { 
                console.log("Paiement annulé par l'utilisateur"); 
            },
            onError: function(error, payment) { 
                console.error("Erreur lors du paiement", error); 
            }
        });
    }

    // 4. Gestion des paiements non terminés
    function onIncompletePaymentFound(payment) {
        console.log("Paiement incomplet détecté", payment);
    }

    // Lancer le processus au chargement de la page
    window.onload = startFlow;
</script>
