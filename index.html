<!DOCTYPE html>
<html>
<head>
    <title>GBW - Testnet</title>
    <script src="https://minepi.com"></script>
</head>
<body style="text-align: center; padding-top: 50px; font-family: Arial;">
    <h1>GLOBAL-BUSINESS-WORLD</h1>
    <p>Statut : <span id="status">Chargement du SDK...</span></p>

    <button id="payButton" style="padding: 20px; background: #673ab7; color: white; border: none; border-radius: 10px; font-size: 20px;">
        PAYER 1 PI (TEST)
    </button>

    <script>
        const Pi = window.Pi;
        
        // Initialisation vitale
        try {
            Pi.init({ version: "2.0", sandbox: true });
            document.getElementById('status').innerText = "SDK Prêt (Testnet)";
            document.getElementById('status').style.color = "green";
        } catch (e) {
            document.getElementById('status').innerText = "Erreur SDK";
        }

        document.getElementById('payButton').addEventListener('click', async () => {
            try {
                const payment = await Pi.createPayment({
                    amount: 1,
                    memo: "Test Final GBW",
                    metadata: { order: "10-10" }
                }, {
                    onReadyForServerApproval: (id) => {
                        alert("Paiement créé ! ID: " + id);
                        // Note : Normalement ici on appelle le backend pour approuver
                    },
                    onReadyForServerCompletion: (id, txid) => {
                        alert("Succès ! Étape 10 validée. TXID: " + txid);
                    },
                    onCancel: (id) => { console.log("Annulé"); },
                    onError: (err) => { alert("Erreur Pi : " + err.message); }
                });
            } catch (err) {
                alert("Erreur de clic : " + err.message);
            }
        });
    </script>
</body>
</html>
