<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Paiement Pi - GBW</title>
    <script src="https://minepi.com"></script>
</head>
<body style="text-align: center; padding-top: 50px; font-family: Arial, sans-serif;">

    <h1>Ma Plateforme Business (GBW)</h1>
    <p>Étape 10 : Test de transaction</p>
    
    <button id="btn-payment" style="padding: 15px 30px; background: #673ab7; color: white; border: none; border-radius: 5px; cursor: pointer;">
        Payer 0.1 Pi pour test
    </button>

    <script>
      const Pi = window.Pi;
      Pi.init({ version: "2.0", sandbox: true }); 

      document.getElementById('btn-payment').onclick = function() {
        console.log("Lancement du paiement...");
        
        Pi.createPayment({
          amount: 0.1,
          memo: "Test Etape 10 GBW",
          metadata: { orderId: "test-101" }
        }, {
          onReadyForServerApproval: function(paymentId) {
            console.log("Paiement créé. ID à envoyer au backend :", paymentId);
            // C'EST ICI que vous devez normalement appeler votre serveur
            // Pour l'étape 10, si vous n'avez pas de backend, le processus s'arrêtera ici.
          },
          onReadyForServerCompletion: function(paymentId, txid) {
            console.log("Le serveur a complété le paiement. TXID:", txid);
            alert("Transaction réussie !");
          },
          onCancel: function(paymentId) {
            console.log("Paiement annulé par l'utilisateur.");
          },
          onError: function(error, payment) {
            console.error("Erreur de paiement détaillée :", error);
            alert("Erreur : " + error.message);
          },
        });
      };
    </script>
</body>
</html>
