<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL BUSINESS WORLD</title>
    <!-- CHARGEMENT DU SDK OFFICIEL -->
    <script src="https://minepi.com"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; padding: 40px 20px; background-color: #121212; color: white; }
        .container { max-width: 400px; margin: auto; border: 1px solid #333; padding: 30px; border-radius: 20px; background: #1e1e1e; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #ff9800; font-size: 24px; margin-bottom: 10px; }
        .btn { background: #ff9800; border: none; padding: 15px 30px; color: white; font-size: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; transition: 0.3s; }
        .btn:disabled { background: #444; cursor: not-allowed; color: #888; }
        #status { margin-top: 20px; color: #ff9800; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>GLOBAL BUSINESS WORLD</h1>
        <p>Test de transaction Pi Network</p>

        <button id="pay-button" class="btn" disabled>Payer 1 Pi</button>
        
        <div id="status">Vérification du SDK Pi...</div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const payButton = document.getElementById('pay-button');

        // 1. Fonction pour initialiser l'application
        function initPiApp() {
            if (window.Pi) {
                statusDiv.innerText = "SDK détecté. Initialisation...";
                try {
                    window.Pi.init({ version: "2.0", sandbox: true });
                    authenticateUser();
                } catch (e) {
                    statusDiv.innerText = "Erreur d'initialisation : " + e.message;
                }
            } else {
                statusDiv.innerText = "Recherche du SDK Pi (tentative...)...";
                setTimeout(initPiApp, 1500); // Réessaie si le SDK est lent à charger
            }
        }

        // 2. Authentification de l'utilisateur
        async function authenticateUser() {
            try {
                const scopes = ['username', 'payments'];
                
                function onIncompletePaymentFound(payment) {
                    console.log("Paiement incomplet trouvé", payment);
                }

                const auth = await window.Pi.authenticate(scopes, onIncompletePaymentFound);
                
                statusDiv.innerText = "Bienvenue, " + auth.user.username;
                payButton.disabled = false; // Le bouton devient ORANGE ici
                
                payButton.onclick = () => launchPayment(auth.user.username);

            } catch (err) {
                statusDiv.innerText = "Erreur : Ouvrez l'URL dans le Pi Browser.";
                console.error(err);
            }
        }

        // 3. Lancement du paiement
        function launchPayment(username) {
            statusDiv.innerText = "Préparation du paiement...";

            window.Pi.createPayment({
                amount: 1.0,
                memo: "Test Transaction GBW pour " + username,
                metadata: { orderId: "ORDER_" + Date.now() },
            }, {
                onReadyForServerApproval: function(paymentId) {
                    statusDiv.innerText = "Paiement en cours d'approbation...";
                    fetch('/api/payments/approve', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId })
                    });
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    statusDiv.innerText = "Transaction terminée avec succès !";
                    fetch('/api/payments/complete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId, txid })
                    });
                },
                onCancel: function(paymentId) { 
                    statusDiv.innerText = "Vous avez annulé le paiement."; 
                },
                onError: function(error, payment) { 
                    statusDiv.innerText = "Erreur technique : " + error.message; 
                },
            });
        }

        // Démarrage au chargement de la page
        window.onload = initPiApp;
    </script>
</body>
</html>
