<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>GLOBAL BUSINESS WORLD</title>
    
    <!-- CHARGEMENT DU SDK PI (Lien officiel et complet) -->
    <script src="https://minepi.com"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; padding: 40px 20px; background-color: #121212; color: white; margin: 0; }
        .container { max-width: 400px; margin: 50px auto; border: 1px solid #333; padding: 30px; border-radius: 20px; background: #1e1e1e; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #ff9800; font-size: 24px; margin-bottom: 10px; }
        .btn { background: #ff9800; border: none; padding: 15px 30px; color: white; font-size: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; transition: 0.3s; }
        .btn:disabled { background: #444; cursor: not-allowed; color: #888; }
        #status { margin-top: 20px; color: #ff9800; font-size: 14px; min-height: 20px; font-weight: bold; }
        .loader { border: 3px solid #333; border-top: 3px solid #ff9800; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>GLOBAL BUSINESS WORLD</h1>
        <p>Test de transaction Pi Network</p>

        <button id="pay-button" class="btn" disabled>Payer 1 Pi</button>
        
        <div id="status">
            <div class="loader" id="loader"></div>
            <span id="status-text">Initialisation du SDK...</span>
        </div>
    </div>

    <script>
        const statusText = document.getElementById('status-text');
        const loader = document.getElementById('loader');
        const payButton = document.getElementById('pay-button');

        // 1. Initialisation avec boucle de vérification
        function checkSDK() {
            if (window.Pi) {
                console.log("SDK détecté !");
                statusText.innerText = "SDK connecté. Identification...";
                try {
                    window.Pi.init({ version: "2.0", sandbox: true });
                    startAuth();
                } catch (e) {
                    statusText.innerText = "Erreur Pi.init: " + e.message;
                    loader.style.display = "none";
                }
            } else {
                statusText.innerText = "En attente du SDK Pi...";
                setTimeout(checkSDK, 1000); // Réessaie chaque seconde
            }
        }

        // 2. Authentification
        async function startAuth() {
            try {
                const scopes = ['username', 'payments'];
                
                function onIncompletePaymentFound(payment) {
                    console.log("Paiement incomplet:", payment);
                };

                const auth = await window.Pi.authenticate(scopes, onIncompletePaymentFound);
                
                statusText.innerText = "Connecté : " + auth.user.username;
                loader.style.display = "none";
                payButton.disabled = false; // Active le bouton orange
                
                payButton.onclick = () => processPayment(auth.user.username);

            } catch (err) {
                statusText.innerText = "Veuillez ouvrir dans le Pi Browser.";
                loader.style.display = "none";
                console.error(err);
            }
        }

        // 3. Gestion du paiement
        function processPayment(username) {
            statusText.innerText = "Ouverture du portefeuille...";
            loader.style.display = "inline-block";

            window.Pi.createPayment({
                amount: 1.0,
                memo: "Transaction Test GBW - " + username,
                metadata: { orderId: "GBW-" + Date.now() },
            }, {
                onReadyForServerApproval: function(paymentId) {
                    statusText.innerText = "Approbation serveur...";
                    fetch('/api/payments/approve', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId })
                    });
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    statusText.innerText = "Félicitations ! Payé avec succès.";
                    loader.style.display = "none";
                    fetch('/api/payments/complete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId, txid })
                    });
                },
                onCancel: function(paymentId) { 
                    statusText.innerText = "Paiement annulé.";
                    loader.style.display = "none";
                },
                onError: function(error, payment) { 
                    statusText.innerText = "Erreur: " + error.message; 
                    loader.style.display = "none";
                },
            });
        }

        // Démarrage
        window.onload = checkSDK;
    </script>
</body>
</html>
