<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Paiement Pi - GBW</title>
    <!-- Voici la ligne précise du SDK que vous devez utiliser -->
    <script src="https://minepi.com"></script>
</head>
<body style="text-align: center; padding-top: 50px; font-family: Arial, sans-serif;">

    <h1>Ma Plateforme Business (GBW)</h1>
    <p>Étape 10 : Test de transaction</p>
    
    <button id="btn-payment" style="padding: 15px 30px; background: #673ab7; color: white; border: none; border-radius: 5px; cursor: pointer;">
        Payer 0.1 Pi pour test
    </button>

    <script>
      // Initialisation du SDK Pi
      const Pi = window.Pi;
      Pi.init({ version: "2.0", sandbox: true }); 

      document.getElementById('btn-payment').onclick = function() {
        Pi.createPayment({
          amount: 0.1,
          memo: "Test Etape 10 GBW",
          metadata: { orderId: "test-101" },
        }, {
          onReadyForServerApproval: function(paymentId) {
            console.log("ID de transaction à approuver sur votre serveur :", paymentId);
            // Ici, vous devrez normalement envoyer cet ID à votre backend
          },
          onReadyForServerCompletion: function(paymentId, txid) {
            alert("Transaction réussie ! ID : " + txid);
          },
          onCancel: function(paymentId) { console.log("Paiement annulé"); },
          onError: function(error, payment) { console.error("Erreur de paiement:", error); },
        });
      };
    </script>
</body>
</html>
