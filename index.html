<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL BUSINESS WORLD</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --success: #10b981;
            --dark: #1f2937;
            --light: #f3f4f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light);
            color: var(--dark);
        }
        header {
            background-color: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        .subtitle { margin: 5px 0 0 0; font-size: 14px; opacity: 0.9; }
        main {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        #status-message {
            text-align: center;
            font-weight: 500;
            color: #6b7280;
            margin-bottom: 20px;
        }
        #catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
        }
        .product-card:hover { transform: translateY(-5px); }
        .badge {
            background-color: #dbeafe;
            color: #1e40af;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .product-title {
            font-size: 16px;
            margin: 10px 0 5px 0;
            font-weight: 600;
        }
        .product-desc {
            font-size: 13px;
            color: #4b5563;
            margin: 0 0 15px 0;
            line-height: 1.4;
        }
        .price {
            font-size: 18px;
            font-weight: 700;
            color: var(--success);
            margin: 0;
        }
        .supplier {
            font-size: 11px;
            color: #9ca3af;
            margin: 3px 0 0 0;
        }
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }
    </style>
</head>
<body>

    <header>
        <h1>GLOBAL BUSINESS WORLD</h1>
        <p class="subtitle">Vêtements • Chaussures • Parfums • Laptops • Smartphones & Accessoires • Montres Smart • Matériel Électrique • Ménage</p>
    </header>

    <main>
        <div id="status-message">Connexion au catalogue en cours...</div>
        <div id="catalog-container"></div>
    </main>

    <!-- CORRECTION 1 : Lien officiel et complet vers le script de Supabase -->
    <script src="https://jsdelivr.net"></script>
    
    <script>
        const SUPABASE_URL = "https://dmmtysjspdoodiikcaho.supabase.co";
        const SUPABASE_KEY = "sb_publishable_75_PjC_NLzdxaLfuiU-0g_hSmidt-J";
        
        // Initialisation correcte via la bibliothèque globale
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadProducts() {
            const container = document.getElementById('catalog-container');
            const status = document.getElementById('status-message');
            try {
                const { data, error } = await supabase.from('products').select('*');
                if (error) {
                    status.innerText = "Erreur de chargement du catalogue.";
                    console.error(error);
                    return;
                }
                
                status.style.display = "none";
                container.innerHTML = "";

                if (!data || data.length === 0) {
                    container.innerHTML = "<div class='loading'>Aucun article disponible pour le moment.</div>";
                    return;
                }

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    
                    const defaultImage = "https://unsplash.com";
                    const itemImage = item.image_url || defaultImage;
                    const itemName = item.name || item.item_name || 'Article sans nom';

                    const whatsappNumber = "221770307574"; 
                    const message = encodeURIComponent(`Bonjour GLOBAL BUSINESS WORLD, je suis intéressé(e) par l'article : ${itemName}`);
                    
                    // CORRECTION 2 : Syntaxe du lien WhatsApp corrigée avec le / et le $
                    const whatsappUrl = `https://wa.me{whatsappNumber}?text=${message}`;

                    card.innerHTML = `
                        <div>
                            <div style="width:100%; height:180px; overflow:hidden; border-radius:8px; margin-bottom:12px; background:#f3f4f6;">
                                <img src="${itemImage}" alt="${itemName}" style="width:100%; height:100%; object-fit:cover;">
                            </div>
                            <span class="badge">${item.category || 'Général'}</span>
                            <h3 class="product-title">${itemName}</h3>
                            <p class="product-desc">${item.description || 'Pas de description disponible.'}</p>
                        </div>
                        <div>
                            <p class="price">${item.price ? item.price + ' FCFA' : 'Prix sur demande'}</p>
                            <p class="supplier" style="margin-bottom: 12px;">Magasin : ${item.supplier || 'GBW Partner'}</p>
                            <a href="${whatsappUrl}" target="_blank" style="display:block; text-align:center; background:#25d366; color:white; padding:10px; border-radius:6px; text-decoration:none; font-weight:bold; font-size:14px;">Commander sur WhatsApp</a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                status.innerText = "Erreur réseau critique.";
                console.error(err);
            }
        }

        loadProducts();

        supabase.channel('custom-all-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'products' }, () => { loadProducts(); })
            .subscribe();
    </script>
</body>
</html>
