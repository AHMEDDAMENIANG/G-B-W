<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Business World - Paiement Pi</title>
    
    <!-- 1. CHARGEMENT DU SDK PI (CORRIGÉ ICI) -->
    <script src="https://minepi.com"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background-color: #1c1c1c;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(230, 126, 34, 0.3);
            width: 90%;
            max-width: 400px;
        }
        h1 { color: #e67e22; font-size: 24px; margin-bottom: 5px; }
        p { color: #bdc3c7; margin-bottom: 25px; }
        button {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        button:disabled { background-color: #7f8c8d; cursor: not-allowed; }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #f1c40f;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>GLOBAL BUSINESS WORLD</h1>
        <p>Test de transaction Pi Network</p>
        
        <button id="btn-payer" onclick="lancerPaiement()" disabled>Payer 1 Pi</button>
        
        <div id="status">Chargement du SDK...</div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const btnPayer = document.getElementById('btn-payer');

        // 2. INITIALISATION SÉCURISÉE
        try {
            if (window.Pi) {
                Pi.init({ version: "2.0", sandbox: true });
                console.log("Pi SDK est initialisé.");
            } else {
                statusDiv.innerText = "SDK introuvable. Utilisez le Pi Browser.";
            }
        } catch (e) {
            statusDiv.innerText = "Erreur d'initialisation.";
        }

        // 3. AUTHENTIFICATION AUTOMATIQUE
        async function authentifier() {
            try {
                const scopes = ['payments'];
                const user = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                statusDiv.innerText = "Connecté : " + user.user.username;
                statusDiv.style.color = "#2ecc71";
                btnPayer.disabled = false; 
            } catch (err) {
                statusDiv.innerText = "Erreur d'accès : Ouvrez dans le Pi Browser.";
            }
        }

        function onIncompletePaymentFound(payment) {
            console.log("Paiement incomplet :", payment);
        }

        // 4. LOGIQUE DE PAIEMENT
        async function lancerPaiement() {
            try {
                btnPayer.disabled = true;
                statusDiv.innerText = "Demande de paiement en cours...";

                await Pi.createPayment({
                    amount: 1,
                    memo: "Test GBW",
                    metadata: { orderId: "123" }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        statusDiv.innerText = "Approbation nécessaire (côté serveur).";
                        console.log("ID de paiement :", paymentId);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        statusDiv.innerText = "Réussi ! TXID: " + txid;
                    },
                    onCancel: (paymentId) => { statusDiv.innerText = "Annulé."; btnPayer.disabled = false; },
                    onError: (error) => { statusDiv.innerText = "Erreur : " + error.message; btnPayer.disabled = false; }
                });
            } catch (err) {
                statusDiv.innerText = "Erreur fatale.";
                btnPayer.disabled = false;
            }
        }

        window.onload = authentifier;
    </script>

</body>
</html>
