<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL BUSINESS WORLD - Paiement Pi</title>
    <!-- 1. CHARGEMENT DU SDK PI -->
    <script src="https://minepi.com"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #121212; color: white; }
        .btn { background: #ff9800; border: none; padding: 15px 30px; color: white; font-size: 18px; border-radius: 8px; cursor: pointer; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        #status { margin-top: 20px; color: #bbb; }
    </style>
</head>
<body>

    <h1>GLOBAL BUSINESS WORLD</h1>
    <p>Test de transaction Pi Network</p>

    <!-- BOUTON DESACTIVÉ PAR DÉFAUT -->
    <button id="pay-button" class="btn" disabled>Payer 1 Pi</button>
    
    <div id="status">Initialisation du SDK...</div>

    <script>
        const Pi = window.Pi;
        const statusDiv = document.getElementById('status');
        const payButton = document.getElementById('pay-button');

        // 2. INITIALISATION (Sandbox: true pour le test)
        Pi.init({ version: "2.0", sandbox: true });

        // 3. AUTHENTIFICATION AUTOMATIQUE AU CHARGEMENT
        async function auth() {
            try {
                const scopes = ['username', 'payments'];
                
                // Fonction pour gérer les paiements non terminés (obligatoire)
                function onIncompletePaymentFound(payment) {
                    console.log("Paiement incomplet trouvé", payment);
                    statusDiv.innerText = "Finalisation d'un paiement en cours...";
                    // Ici, vous devriez envoyer payment.identifier à votre backend
                };

                const authResult = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                statusDiv.innerText = "Connecté en tant que : " + authResult.user.username;
                payButton.disabled = false; // On active le bouton seulement si l'auth réussit
                
                payButton.onclick = () => createPayment(authResult.user.username);

            } catch (err) {
                statusDiv.innerText = "Erreur de connexion : " + err.message;
                console.error(err);
            }
        }

        // 4. FONCTION DE PAIEMENT
        function createPayment(username) {
            statusDiv.innerText = "Ouverture du portefeuille...";

            Pi.createPayment({
                amount: 1.0,
                memo: "Achat sur GBW par " + username,
                metadata: { orderId: "COMMANDE_" + Date.now() },
            }, {
                onReadyForServerApproval: function(paymentId) {
                    statusDiv.innerText = "Approbation du serveur requise...";
                    console.log("PaymentID à envoyer au backend:", paymentId);
                    
                    // ENVOI AU BACKEND (Vercel API)
                    fetch('/api/payments/approve', {
                        method: 'POST',
                        body: JSON.stringify({ paymentId }),
                        headers: { 'Content-Type': 'application/json' }
                    });
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    statusDiv.innerText = "Transaction réussie ! Finalisation...";
                    
                    fetch('/api/payments/complete', {
                        method: 'POST',
                        body: JSON.stringify({ paymentId, txid }),
                        headers: { 'Content-Type': 'application/json' }
                    });
                },
                onCancel: function(paymentId) {
                    statusDiv.innerText = "Transaction annulée.";
                },
                onError: function(error, payment) {
                    statusDiv.innerText = "Erreur de paiement : " + error.message;
                },
            });
        }

        // Lancer l'auth
        auth();
    </script>
</body>
</html>
