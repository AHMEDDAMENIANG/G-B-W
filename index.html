<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-B-W - Pi Network</title>
    
    <!-- 1. Chargement obligatoire du SDK Pi Network -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>


    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            padding: 20px;
        }
        #status {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
        }
        #debug-log {
            background-color: #1e1e1e;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <!-- Bouton visuel sur lequel l'utilisateur va cliquer -->
    <div style="text-align: center; margin: 20px;">
        <button onclick="loginWithPi()" style="background-color: #6200ee; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer;">
            Se connecter avec Pi
        </button>
    </div>

    <!-- Code JavaScript pour faire fonctionner la connexion Pi -->
    <script>
        // Initialisation obligatoire du SDK Pi
        Pi.init({ version: "2.0" });

        // Fonction qui déclenche la fenêtre "Pi Sign-In"
        function loginWithPi() {
            Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
                .then(function(auth) {
                    alert("Connexion réussie ! Bienvenue " + auth.user.username);
                    // L'utilisateur est connecté, vous pouvez charger son profil ici
                })
                .catch(function(error) {
                    alert("Erreur de connexion : " + error.message);
                    console.error("Détails de l'erreur :", error);
                });
        }

        // Fonction obligatoire exigée par le SDK Pi pour gérer les blocages de paiement
        function onIncompletePaymentFound(payment) {
            console.log("Paiement en attente détecté :", payment);
        }
    </script>

    <!-- 2. Éléments HTML indispensables au script -->
    <div id="status">Initialisation...</div>
    <div id="debug-log">Démarrage du système de log...</div>

    <!-- 3. Script JavaScript exécuté au bon moment -->
    <script>
        // Le code attend que toute la page soit construite
        document.addEventListener("DOMContentLoaded", () => {
            
            const statusEl = document.getElementById('status');
            const logEl = document.getElementById('debug-log');
            let isSdkReady = false;

            function addLog(msg) {
                if (logEl) {
                    logEl.innerHTML += "<br>>> " + msg;
                }
                console.log(msg);
            }

            async function initPi() {
                try {
                    if (!window.Pi) {
                        throw new Error("L'objet window.Pi est introuvable. Le SDK n'est pas chargé.");
                    }

                    // Exécution de l'initialisation native
                    window.Pi.init({ version: "2.0", sandbox: false });

                    addLog("SDK Pi initialisé (v1.5).");

                    // Pause de sécurité pour laisser le SDK s'enregistrer
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    isSdkReady = true;

                    addLog("Authentification en cours...");
                    
                    // Appel de l'authentification obligatoire
                    const auth = await window.Pi.authenticate(['username', 'payments'], (payment) => {
                        addLog("Paiement incomplet détecté : " + JSON.stringify(payment));
                    });

                    statusEl.innerText = "PRÊT - Connecté : " + auth.user.username;
                    statusEl.style.color = "green";
                    addLog("Authentifié avec succès comme : " + auth.user.username);

                } catch (err) {
                    statusEl.innerText = "ERREUR";
                    statusEl.style.color = "red";
                    addLog("Erreur critique : " + err.message);
                }
            }

            // Lancement de la fonction principale
            initPi();
        });
    </script>
</body>
</html>
