<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Pi Network Transaction</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script> <!-- Intégration du SDK Pi Network -->
</head>
<body>
  <h1>Test de transaction Pi Network</h1>
  
  <button id="payButton">Payer 1 Pi</button>
  
  <script>
    // Étape 1: Initialisez le Pi Network SDK
    Pi.init({
      appId: "votre_app_id", // Remplacez par votre identifiant unique d'application
      callbackUrl: "https://votre-callback-url.com/pi-payment-result" // Remplacez par votre URL de retour valide
    });

    // Étape 2: Ajoutez un événement au bouton pour effectuer une transaction
    const payButton = document.getElementById("payButton");
    payButton.addEventListener("click", function() {
      // Logique du paiement
      Pi.createPayment({
        // Configuration du paiement
        amount: 1, // Montant à payer (1 Pi dans ce cas)
        memo: "Test de transaction", // Description/mémo de la transaction
        metadata: { 
          orderId: "12345" // Exemple: identifiant de commande
        }
      })
      .then(function (payment) {
        // Réponse en cas de succès
        console.log("Paiement en attente :", payment);
        alert("Paiement créé avec succès. En attente de confirmation.");
      })
      .catch(function (error) {
        // Gestion des erreurs
        console.error("Erreur lors de la création du paiement :", error);
        alert("Erreur lors de la création du paiement : " + error.message);
      });
    });
  </script>
</body>
</html>
