<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL BUSINESS WORLD</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            padding: 20px;
        }
        #status {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }
        #debug-log {
            background-color: #1e1e1e;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <h1 style="text-align: center; margin-top: 40px;">GLOBAL BUSINESS WORLD</h1>
    <p style="text-align: center; color: #aaaaaa;">Plateforme Commerciale Internationale autonome</p>

    <!-- Bouton d'accès standard pour le web traditionnel -->
    <div style="text-align: center; margin: 40px 20px;">
        <button onclick="accederApplication()" style="background-color: #0070f3; color: white; border: none; padding: 14px 28px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: background-color 0.2s;">
            Accéder à la Plateforme Commerciale
        </button>
    </div>

    <!-- Éléments d'affichage de statut -->
    <div id="status">Chargement du système...</div>
    <div id="debug-log">Démarrage du système de log...</div>

    <script>
        // Logique de l'application autonome
        function accederApplication() {
            const statusElement = document.getElementById("status");
            if (statusElement) {
                statusElement.innerText = "Bienvenue sur Global Business World !";
                statusElement.style.color = "#00ff00";
            }
            addLog("L'utilisateur a accédé à la plateforme hors de Pi Browser.");
        }

        // Fonction utilitaire pour écrire dans le bloc de log
        function addLog(msg) {
            const logEl = document.getElementById('debug-log');
            if (logEl) {
                logEl.innerHTML += "<br>>>> " + msg;
            }
            console.log(msg);
        }

        // Initialisation automatique au chargement de la page
        document.addEventListener("DOMContentLoaded", () => {
            const statusEl = document.getElementById('status');
            if (statusEl) {
                statusEl.innerText = "Système Global Business World prêt.";
            }
            addLog("Application initialisée sur le web traditionnel.");
        });
    </script>

</body>
</html>
