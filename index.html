<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-B-W - Pi Network</title>
    
    <!-- 1. Chargement obligatoire du SDK Pi Network -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>


    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            padding: 20px;
        }
        #status {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
        }
        #debug-log {
            background-color: #1e1e1e;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <!-- 2. Éléments HTML indispensables au script -->
    <div id="status">Initialisation...</div>
    <div id="debug-log">Démarrage du système de log...</div>

    <!-- 3. Script JavaScript exécuté au bon moment -->
    <script>
        // Le code attend que toute la page soit construite
        document.addEventListener("DOMContentLoaded", () => {
            
            const statusEl = document.getElementById('status');
            const logEl = document.getElementById('debug-log');
            let isSdkReady = false;

            function addLog(msg) {
                if (logEl) {
                    logEl.innerHTML += "<br>>> " + msg;
                }
                console.log(msg);
            }

            async function initPi() {
                try {
                    if (!window.Pi) {
                        throw new Error("L'objet window.Pi est introuvable. Le SDK n'est pas chargé.");
                    }

                    // Exécution de l'initialisation native
                    window.Pi.init({ version: "1.5", sandbox: true });
                    addLog("SDK Pi initialisé (v1.5).");

                    // Pause de sécurité pour laisser le SDK s'enregistrer
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    isSdkReady = true;

                    addLog("Authentification en cours...");
                    
                    // Appel de l'authentification obligatoire
                    const auth = await window.Pi.authenticate(['username', 'payments'], (payment) => {
                        addLog("Paiement incomplet détecté : " + JSON.stringify(payment));
                    });

                    statusEl.innerText = "PRÊT - Connecté : " + auth.user.username;
                    statusEl.style.color = "green";
                    addLog("Authentifié avec succès comme : " + auth.user.username);

                } catch (err) {
                    statusEl.innerText = "ERREUR";
                    statusEl.style.color = "red";
                    addLog("Erreur critique : " + err.message);
                }
            }

            // Lancement de la fonction principale
            initPi();
        });
    </script>
</body>
</html>
