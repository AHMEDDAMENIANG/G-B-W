<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBW - Final Test</title>
    <script src="minepi.com"></script>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4;">

    <h1 style="color: #673ab7;">GLOBAL-BUSINESS-WORLD</h1>
    
    <div id="status-box" style="margin: 20px auto; padding: 15px; border-radius: 8px; background: white; border: 1px solid #ddd; max-width: 400px;">
        <p>Statut : <span id="status" style="font-weight: bold; color: orange;">Initialisation...</span></p>
    </div>

    <button id="payButton" style="padding: 20px 40px; background-color: #673ab7; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        PAYER 1 PI (TESTNET)
    </button>

    <div id="debug-log" style="margin-top: 30px; text-align: left; font-size: 12px; color: #555; background: #eee; padding: 10px; border-radius: 5px; height: 150px; overflow-y: auto;">
        Log de test :
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const logEl = document.getElementById('debug-log');
        let isSdkReady = false;

        function addLog(msg) {
            logEl.innerHTML += "<br>> " + msg;
            console.log(msg);
        }

        // 1. Initialisation et Authentification ordonnée
        async function initPi() {
            try {
                if (!window.Pi) {
                    throw new Error("L'objet window.Pi est introuvable.");
                }
                
                window.Pi.init({ version: "1.5", sandbox: true });
                addLog("SDK Pi initialisé (v1.5).");
                
                isSdkReady = true;

                const auth = await window.Pi.authenticate(['username', 'payments'], (payment) => {
                    addLog("Paiement incomplet détecté : " + payment.identifier);
                });

                statusEl.innerText = "PRÊT - Connecté : " + auth.user.username;
                statusEl.style.color = "green";
                addLog("Authentifié avec succès comme : " + auth.user.username);
            } catch (err) {
                statusEl.innerText = "ERREUR";
                statusEl.style.color = "red";
                addLog("Erreur Init/Auth: " + err.message);
            }
        }

        initPi();

        // 2. Gestion sécurisée du paiement au clic
        document.getElementById('payButton').addEventListener('click', async () => {
            addLog("Tentative de paiement lancée...");
            
            if (!isSdkReady) {
                addLog("Erreur : Le SDK n'a pas fini de s'initialiser. Attendez un instant...");
                return;
            }
            
            try {
                await window.Pi.createPayment({
                    amount: 1.0,
                    memo: "Validation Etape 10 - GBW",
                    metadata: { orderId: "TEST-10-10" },
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        addLog("Paiement créé ! ID: " + paymentId);
                        addLog("Envoi au serveur backend (/api/approve)...");
                        
                        fetch('/api/approve', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId })
                        })
                        .then(res => {
                            if (!res.ok) throw new Error("Réponse serveur incorrecte");
                            return res.json();
                        })
                        .then(() => addLog("Le serveur a approuvé le paiement !"))
                        .catch(err => addLog("Erreur approbation serveur: " + err.message));
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        addLog("Paiement soumis à la blockchain ! TXID: " + txid);
                        statusEl.innerText = "PAIEMENT RÉUSSI !";
                    },
                    onCancel: (paymentId) => {
                        addLog("Paiement annulé par l'utilisateur.");
                    },
                    onError: (error, paymentId) => {
                        addLog("Erreur durant la transaction: " + error.message);
                    },
                });
            } catch (err) {
                addLog("Erreur critique: " + err.message);
            }
        });
    </script>
</body>
</html>
