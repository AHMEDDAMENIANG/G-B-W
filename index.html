<script>
  const Pi = window.Pi;
  // Assurez-vous que sandbox est 'true' pour vos tests sur le Testnet
  Pi.init({ version: "2.0", sandbox: true }); 

  async function startFlow() {
    try {
      // ÉTAPE A : Authentifier l'utilisateur
      const user = await Pi.authenticate(['payments', 'username'], onIncompletePaymentFound);
      console.log("Utilisateur connecté :", user.username);
      
      // ÉTAPE B : Configurer le bouton après connexion
      document.getElementById('btn-payment').onclick = function() {
        createPiPayment();
      };
    } catch (err) {
      console.error("Erreur d'authentification :", err);
    }
  }

  function createPiPayment() {
    Pi.createPayment({
      amount: 0.1,
      memo: "Test Etape 10 GBW",
      metadata: { orderId: "test-101" }
    }, {
      onReadyForServerApproval: function(paymentId) {
        console.log("Paiement créé :", paymentId);
        // INFO : Ici, vous devez normalement faire un 'fetch' vers votre serveur
        // Exemple : fetch('/api/approve', { method: 'POST', body: JSON.stringify({paymentId}) });
        alert("Paiement créé ! ID: " + paymentId + "\nEn attente de validation serveur...");
      },
      onReadyForServerCompletion: function(paymentId, txid) {
        alert("Transaction réussie ! TXID: " + txid);
      },
      onCancel: function(paymentId) { console.log("Annulé"); },
      onError: function(error, payment) { console.error("Erreur :", error); },
    });
  }

  function onIncompletePaymentFound(payment) {
    console.log("Paiement non terminé trouvé :", payment);
    // Optionnel : renvoyer vers votre serveur pour régulariser
  };

  // Lancer le flux au chargement
  startFlow();
</script>
