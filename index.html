<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Business World - Paiement Pi</title>
    
    <!-- 1. CHARGEMENT DU SDK PI (Obligatoire) -->
    <script src="https://minepi.com"></script>


    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background-color: #1c1c1c;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(230, 126, 34, 0.3);
            width: 90%;
            max-width: 400px;
        }
        h1 { color: #e67e22; font-size: 24px; margin-bottom: 5px; }
        p { color: #bdc3c7; margin-bottom: 25px; }
        button {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        button:disabled { background-color: #7f8c8d; cursor: not-allowed; }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #f1c40f;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>GLOBAL BUSINESS WORLD</h1>
        <p>Test de transaction Pi Network</p>
        
        <button id="btn-payer" onclick="lancerPaiement()" disabled>Payer 1 Pi</button>
        
        <div id="status">Initialisation du SDK...</div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const btnPayer = document.getElementById('btn-payer');

        // 2. INITIALISATION DU SDK (Mode Testnet)
        try {
            Pi.init({ version: "2.0", sandbox: true });
            console.log("Pi SDK est initialisé.");
        } catch (e) {
            statusDiv.innerText = "Erreur d'initialisation du SDK.";
        }

        // 3. AUTHENTIFICATION AUTOMATIQUE
        async function authentifier() {
            try {
                const scopes = ['payments'];
                const user = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                statusDiv.innerText = "Connecté : " + user.user.username;
                statusDiv.style.color = "#2ecc71";
                btnPayer.disabled = false; // Active le bouton après connexion
            } catch (err) {
                statusDiv.innerText = "Veuillez ouvrir dans le Pi Browser.";
                console.error(err);
            }
        }

        // Gestion des paiements non terminés
        function onIncompletePaymentFound(payment) {
            console.log("Un paiement incomplet a été trouvé", payment);
        }

        // 4. LOGIQUE DE PAIEMENT
        async function lancerPaiement() {
            try {
                btnPayer.disabled = true;
                statusDiv.innerText = "Préparation du paiement...";

                const payment = await Pi.createPayment({
                    amount: 1,
                    memo: "Test de transaction GBW",
                    metadata: { orderId: "TEST-123" }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        statusDiv.innerText = "En attente d'approbation serveur...";
                        // Note: En testnet sans serveur, cela peut rester bloqué ici
                        console.log("PaymentID à approuver :", paymentId);
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        statusDiv.innerText = "Transaction réussie !";
                        btnPayer.innerText = "Payé ✔";
                    },
                    onCancel: function(paymentId) {
                        statusDiv.innerText = "Paiement annulé.";
                        btnPayer.disabled = false;
                    },
                    onError: function(error, payment) {
                        statusDiv.innerText = "Erreur : " + error.message;
                        btnPayer.disabled = false;
                    }
                });
            } catch (err) {
                statusDiv.innerText = "Erreur fatale : " + err.message;
                btnPayer.disabled = false;
            }
        }

        // Lancer l'authentification dès le chargement de la page
        window.onload = authentifier;
    </script>

</body>
</html>
