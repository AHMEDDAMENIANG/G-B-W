<!-- 1. Le lien technique indispensable (SDK Pi) -->
<script src="https://minepi.com"></script>

<!-- 2. Un bouton pour tester le paiement (affiché après connexion) -->
<button id="btn-payment" style="display:none; padding: 15px; background: #673ab7; color: white; border: none; border-radius: 8px; cursor: pointer;">
  Payer 0.1 Pi pour tester
</button>

<!-- 3. Le script de fonctionnement -->
<script>
  // Initialisation du SDK
  Pi.init({ version: "2.0", sandbox: true }); 

  async function startFlow() {
    try {
      // Authentification automatique
      const user = await Pi.authenticate(['payments', 'username'], onIncompletePaymentFound);
      console.log("Connecté :", user.username);
      
      // On montre le bouton et on active le clic
      const payBtn = document.getElementById('btn-payment');
      if(payBtn) {
        payBtn.style.display = "block";
        payBtn.onclick = createPiPayment;
      }
    } catch (err) {
      console.error("Erreur : Ouvrez l'application dans le Pi Browser.");
    }
  }

  function createPiPayment() {
    Pi.createPayment({
      amount: 0.1,
      memo: "Test de transaction GBW",
      metadata: { orderId: "GBW-" + Date.now() }
    }, {
      onReadyForServerApproval: function(paymentId) {
        // Cette ID s'affichera quand vous cliquerez sur Payer
        alert("Paiement créé avec succès ! ID : " + paymentId);
      },
      onReadyForServerCompletion: function(paymentId, txid) {
        alert("Transaction terminée ! TXID : " + txid);
      },
      onCancel: function(paymentId) { console.log("Paiement annulé"); },
      onError: function(error, payment) { console.error("Erreur :", error); },
    });
  }

  function onIncompletePaymentFound(payment) {
    console.log("Paiement incomplet trouvé");
  };

  // Lance tout au chargement de la page
  window.onload = startFlow;
</script>
